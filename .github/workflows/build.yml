name: Build Linux

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12.2"
  NODE_VERSION: "20"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ---------------------------------
      # 拉取代码
      # ---------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------
      # Python
      # ---------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        working-directory: package
        run: |
          python -m pip install --upgrade pip
          pip install wheel
          pip install pyinstaller
          pip install -r requirements.txt

      # ---------------------------------
      # Node (前端)
      # ---------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: package/frontend
        run: npm ci

      - name: Build frontend
        working-directory: package/frontend
        run: npm run build

      - name: Copy frontend build
        working-directory: package
        run: |
          rm -rf static
          cp -r frontend/dist static

      # ---------------------------------
      # PyInstaller
      # ---------------------------------
      - name: Build with PyInstaller
        working-directory: package
        run: pyinstaller app.spec --clean

      # ---------------------------------
      # 自动识别 dist 输出（兼容中文名）
      # ---------------------------------
      - name: Archive build output
        working-directory: package
        run: |
          VERSION=${GITHUB_SHA::7}
          cd dist
          echo "Dist contents:"
          ls -lah
          OUTPUT=$(ls | head -n 1)
          echo "Detected output: $OUTPUT"
          tar -czvf "../BypassAIGC-Linux-${VERSION}.tar.gz" "$OUTPUT"

      # ---------------------------------
      # 上传 Artifact
      # ---------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BypassAIGC-Linux
          path: package/BypassAIGC-Linux-*.tar.gz
          retention-days: 30
