name: Build Linux

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12.2"
  NODE_VERSION: "20"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Python 环境
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps
        working-directory: package
        run: |
          python -m pip install --upgrade pip
          pip install wheel
          pip install pyinstaller
          pip install -r requirements.txt

      # -------------------------
      # Node 环境（前端）
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: package/frontend
        run: npm ci

      - name: Build frontend
        working-directory: package/frontend
        run: npm run build

      - name: Copy frontend build
        working-directory: package
        run: |
          rm -rf static
          cp -r frontend/dist static

      # -------------------------
      # PyInstaller 打包
      # -------------------------
      - name: Build with PyInstaller
        working-directory: package
        run: pyinstaller app.spec --clean

      # -------------------------
      # 打包成 tar.gz
      # -------------------------
      - name: Archive
        working-directory: package
        run: |
          VERSION=${GITHUB_SHA::7}
          tar -czvf "BypassAIGC-Linux-${VERSION}.tar.gz" -C dist BypassAIGC

      # -------------------------
      # 上传构建产物（关键步骤）
      # -------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BypassAIGC-Linux
          path: package/*.tar.gz
          retention-days: 30
